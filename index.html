<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Live Bracket</title>
<style>
  :root{
    --bg:#0b0b0e; --gold:#e8b53f; --gold2:#f4d47a; --green:#37d67a;
    --line:#2f2f38; --text:#f3f3f5; --muted:#8b8b96; --live:#ff4d4d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#060608;color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
  header{text-align:center;padding:20px 16px 4px}
  header h1{font-size:clamp(20px,4vw,34px);letter-spacing:3px;font-weight:800;text-transform:uppercase;
    background:linear-gradient(90deg,#fff,var(--gold),#fff);-webkit-background-clip:text;background-clip:text;color:transparent}
  header .sub{color:var(--muted);font-size:12px;margin-top:4px;letter-spacing:1px}
  .bar{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin:12px 0 0;font-size:12px}
  .status{display:inline-flex;align-items:center;gap:7px;background:#141419;border:1px solid #26262e;
    padding:6px 12px;border-radius:20px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .dot.ok{background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.err{background:var(--live);box-shadow:0 0 8px var(--live)}
  .dot.load{background:var(--gold);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  button.refresh{background:var(--gold);color:#1a1400;border:none;font-weight:700;padding:7px 15px;border-radius:20px;cursor:pointer;font-size:12px}
  button.refresh:hover{background:var(--gold2)}

  .stage{display:flex;justify-content:center;align-items:flex-start;overflow:hidden;padding:6px 0 30px}
  .scaler{transform-origin:top center}
  .canvas{position:relative}
  svg.links{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:visible}

  /* halo central */
  .glow{position:absolute;left:50%;top:50%;width:340px;height:340px;transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(232,181,63,.22)0%,rgba(232,181,63,.06)40%,transparent70%);
    z-index:0;pointer-events:none;filter:blur(2px)}
  .center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;z-index:6;pointer-events:none}
  .center .trophy{font-size:58px;line-height:1;filter:drop-shadow(0 0 26px var(--gold))}
  .center .champ{margin-top:2px;font-weight:800;color:var(--gold);font-size:12px;letter-spacing:1px}

  /* pastilles équipes */
  .node{position:absolute;transform:translate(-50%,-50%);border-radius:50%;
    display:flex;align-items:center;justify-content:center;z-index:3;
    background:#101014;border:2px solid #2a2a33;overflow:visible;transition:transform .15s}
  .node img.flag{width:100%;height:100%;object-fit:cover;border-radius:50%;background:#222}
  .node .crest{position:absolute;bottom:-4px;right:-4px;width:54%;height:54%;border-radius:50%;
    object-fit:contain;background:#fff;border:1.5px solid #0b0b0e;padding:1px;z-index:5;box-shadow:0 1px 3px #000}
  .node.pending{background:repeating-linear-gradient(45deg,#151519,#151519 4px,#1b1b21 4px,#1b1b21 8px);border-color:#2a2a33}
  .node.win{border-color:var(--gold);box-shadow:0 0 10px rgba(232,181,63,.55)}
  .node.champ{border-color:var(--gold2);box-shadow:0 0 22px var(--gold)}
  .node.schednode{border:2px dashed var(--gold);background:rgba(232,181,63,.07)}
  .node.out{filter:grayscale(1);opacity:.4;border-color:#333;box-shadow:none}
  .node.out .code{color:#555}
  .node.live{border-color:var(--live);animation:livepulse 1.1s infinite}
  @keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,77,.6)}50%{box-shadow:0 0 0 6px rgba(255,77,77,0)}}
  .node:hover{transform:translate(-50%,-50%) scale(1.18);z-index:9}
  .score{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);
    font-size:10px;font-weight:800;color:var(--gold);white-space:nowrap;text-shadow:0 1px 3px #000}
  .score.livesc{color:var(--live)}
  .code{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
    font-size:8px;font-weight:700;letter-spacing:.5px;color:var(--muted);white-space:nowrap}

  .ringlbl{position:absolute;transform:translate(-50%,-50%);z-index:2;font-size:10px;letter-spacing:2px;
    color:var(--muted);text-transform:uppercase;opacity:.6;pointer-events:none}
  .msg{text-align:center;color:var(--muted);padding:30px;max-width:640px;margin:0 auto;line-height:1.6}
  footer{text-align:center;color:var(--muted);font-size:11px;padding:0 16px 26px}
  footer a{color:var(--gold)}
</style>
</head>
<body>
<header>
  <h1>World Cup 2026</h1>
  <div class="sub">🇨🇦 🇲🇽 🇺🇸 — Knockout stage · live</div>
  <div class="bar">
    <span class="status"><span class="dot load" id="dot"></span><span id="statusTxt">Loading…</span></span>
    <button class="refresh" id="refreshBtn">↻ Refresh</button>
  </div>
</header>

<div class="stage">
  <div class="scaler" id="scaler">
    <div class="canvas" id="canvas">
      <div class="glow"></div>
      <svg class="links" id="links"></svg>
      <div class="center" id="center"></div>
    </div>
  </div>
</div>
<div id="msg"></div>

<footer>
  Live data via <a href="https://www.thesportsdb.com" target="_blank">TheSportsDB</a> ·
  auto-refresh 60s · hover a badge for details · <span id="upd">—</span>
</footer>

<script>
// ===================== API =====================
// TheSportsDB — clé gratuite "123", ligue 4429 (World Cup), saison 2026.
// Un appel par tour éliminatoire. Codes intRound : 32,16,8,4,2 (r=2 = finale,
// partagé avec la 2e journée de poules -> filtré par date).
const KEY  = "123";
const BASE = `https://www.thesportsdb.com/api/v1/json/${KEY}/eventsround.php?id=4429&s=2026&r=`;
const KO_ROUNDS = [
  {r:32, st:"R32"}, {r:16, st:"R16"}, {r:8, st:"QF"}, {r:4, st:"SF"}, {r:2, st:"F"}
];
const ORDER = ["R32","R16","QF","SF","F"];
const LABEL = {R32:"Round of 32",R16:"Round of 16",QF:"Quarter-finals",SF:"Semi-finals",F:"Final"};

// ===================== Géométrie =====================
const SIZE = 940, C = SIZE/2;
const RINGS = {          // rayon (px) et taille des pastilles par anneau
  teams:{r:C-42, sz:40},   // 32 équipes (extérieur)
  R32:  {r:340,  sz:42},   // vainqueurs 8es de tour (16)
  R16:  {r:250,  sz:46},   // vainqueurs huitièmes (8)
  QF:   {r:168,  sz:50},   // vainqueurs quarts (4)
  SF:   {r:92,   sz:56},   // finalistes (2)
};
const el = id => document.getElementById(id);
const rad = deg => deg*Math.PI/180;
const pos = (angle,r)=>({x:C+r*Math.cos(angle), y:C+r*Math.sin(angle)});
function meanAngle(list){let x=0,y=0;list.forEach(a=>{x+=Math.cos(a);y+=Math.sin(a)});return Math.atan2(y,x);}
// ramène tout angle dans [-90°, 270°) pour trier les nœuds dans l'ordre du cercle
function normAng(a){while(a<-Math.PI/2)a+=2*Math.PI;while(a>=1.5*Math.PI)a-=2*Math.PI;return a;}

// ===================== Chargement =====================
async function load(){
  setStatus("load","Connecting to API…");
  try{
    const results = await Promise.all(KO_ROUNDS.map(k=>
      fetch(BASE+k.r,{cache:"no-store"}).then(r=>r.ok?r.json():{events:null}).catch(()=>({events:null}))
    ));
    const byStage={}; ORDER.forEach(s=>byStage[s]=[]);
    results.forEach((data,i)=>{
      const k=KO_ROUNDS[i], evs=(data&&data.events)?data.events:[];
      evs.forEach(ev=>{
        if(k.r===2 && !(ev.dateEvent && ev.dateEvent>="2026-07-16")) return; // exclut la 2e j. de poules
        byStage[k.st].push(ev);
      });
    });
    ORDER.forEach(s=>byStage[s].sort((a,b)=>
      ((a.dateEvent||"")+(a.strTime||"")).localeCompare((b.dateEvent||"")+(b.strTime||"")) || (+a.idEvent)-(+b.idEvent)));
    if(!ORDER.some(s=>byStage[s].length)) throw new Error("No knockout matches returned");
    render(byStage);
    const live = ORDER.flatMap(s=>byStage[s]).filter(isLive).length;
    const tot  = ORDER.reduce((n,s)=>n+byStage[s].length,0);
    setStatus("ok", tot+" matches"+(live?` · ${live} LIVE`:""));
    el("upd").textContent=new Date().toLocaleTimeString("en-US");
  }catch(err){
    setStatus("err","Error: "+err.message);
    el("msg").innerHTML="<div class='msg'>Could not reach the API. Retrying in 60s.<br><small>"+err+"</small></div>";
  }
}
function setStatus(t,txt){el("dot").className="dot "+({load:"load",ok:"ok",err:"err"}[t]||"");el("statusTxt").textContent=txt;}

function isFinished(e){if(!e)return false;const s=(e.strStatus||"").toUpperCase();
  return ["FT","AET","AP","PEN","FINISHED"].some(x=>s.includes(x)) ||
         (e.intHomeScore!=null&&e.intAwayScore!=null&&s!=="NS"&&s!=="");}
function isLive(e){if(!e)return false;const s=(e.strStatus||"").toUpperCase();
  return (/\d/.test(s)||["1H","2H","HT","ET","LIVE","PLAY"].some(x=>s.includes(x))) && !isFinished(e) && s!=="NS" && s!=="";}

// ===================== Rendu =====================
function render(byStage){
  el("msg").innerHTML="";
  el("canvas").style.width=SIZE+"px"; el("canvas").style.height=SIZE+"px";
  const svg=el("links"); svg.setAttribute("viewBox",`0 0 ${SIZE} ${SIZE}`); svg.setAttribute("width",SIZE); svg.setAttribute("height",SIZE);
  svg.innerHTML=`<defs>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe08a"/><stop offset="1" stop-color="#d99a1f"/></linearGradient>
    <filter id="goldglow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#e8b53f" flood-opacity="0.85"/></filter>
  </defs>`;
  document.querySelectorAll(".node,.ringlbl").forEach(n=>n.remove());

  // cercles-guides
  [RINGS.teams.r,RINGS.R32.r,RINGS.R16.r,RINGS.QF.r,RINGS.SF.r].forEach(r=>{
    const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",C);c.setAttribute("cy",C);c.setAttribute("r",r);
    c.setAttribute("fill","none");c.setAttribute("stroke","#191920");c.setAttribute("stroke-width",1);
    svg.appendChild(c);
  });

  // gagnant d'un match : équipe présente au tour suivant (gère les tirs au but), sinon meilleur score
  const teamsAt={}; ORDER.forEach(s=>teamsAt[s]=new Set(byStage[s].flatMap(e=>[e.strHomeTeam,e.strAwayTeam].filter(Boolean))));
  function winner(e,si){const nx=ORDER[si+1]?teamsAt[ORDER[si+1]]:null,h=e.strHomeTeam,a=e.strAwayTeam;
    if(nx){if(nx.has(h)&&!nx.has(a))return h;if(nx.has(a)&&!nx.has(h))return a;}
    if(isFinished(e)){if(+e.intHomeScore>+e.intAwayScore)return h;if(+e.intAwayScore>+e.intHomeScore)return a;}
    return null;}
  const badgeOf=(e,team)=> team===e.strHomeTeam?e.strHomeTeamBadge : team===e.strAwayTeam?e.strAwayTeamBadge : null;
  const scoreTxt=e=> (e.intHomeScore!=null&&e.intAwayScore!=null)?`${e.intHomeScore}–${e.intAwayScore}`:"";
  // état d'une ligne : parcours gagné / match programmé / en direct / perdu / indéterminé
  function lineState(m,w,team){
    if(isLive(m)) return "live";
    if(isFinished(m)) return team===w ? "won" : "lost";
    if(m.strHomeTeam && m.strAwayTeam) return "sched"; // match à venir, adversaires connus
    return "cold";
  }

  const links=[];

  // ---- Ordre du tableau : deux matchs dont les vainqueurs se rencontrent au
  //      tour suivant sont placés côte à côte (déduit récursivement des tours
  //      disponibles). Ex : Canada et Maroc s'affrontent en 8es -> adjacents.
  function feedersOf(m,si){
    if(si<=0) return [];
    const parts=[m.strHomeTeam,m.strAwayTeam].filter(Boolean);
    return byStage[ORDER[si-1]].filter(pm=>{const w=winner(pm,si-1);return w&&parts.includes(w);});
  }
  const orderedR32=[]; const seen=new Set();
  (function(){
    function expand(m,si){
      if(si===0){ if(!seen.has(m)){seen.add(m);orderedR32.push(m);} return; }
      feedersOf(m,si).forEach(f=>expand(f,si-1));
    }
    let T=-1; for(let i=ORDER.length-1;i>=1;i--){ if(byStage[ORDER[i]].length){T=i;break;} }
    if(T>0) byStage[ORDER[T]].forEach(m=>expand(m,T));
    byStage.R32.forEach(m=>{ if(!seen.has(m)){seen.add(m);orderedR32.push(m);} }); // matchs pas encore appariés
  })();

  // ---- Anneau extérieur : 32 équipes + vainqueurs des 8es de tour (R32) ----
  const nR32=byStage.R32.length;
  const slots=Math.max(nR32*2,2);
  const r32win=[];
  orderedR32.forEach((m,j)=>{
    const w=winner(m,0);
    const aH=rad(-90+(2*j)  *360/slots), aA=rad(-90+(2*j+1)*360/slots);
    const nH=teamNode(m.strHomeTeam,m.strHomeTeamBadge,aH,RINGS.teams,w===m.strHomeTeam,m,true);
    const nA=teamNode(m.strAwayTeam,m.strAwayTeamBadge,aA,RINGS.teams,w===m.strAwayTeam,m,true);
    const wa=meanAngle([aH,aA]);
    const wn=teamNode(w,badgeOf(m,w),wa,RINGS.R32,true,m,false);
    wn.team=w; r32win.push(wn);
    links.push({a:nH,b:wn,state:lineState(m,w,m.strHomeTeam)},{a:nA,b:wn,state:lineState(m,w,m.strAwayTeam)});
  });

  // ---- Anneaux intérieurs (R16, QF, SF) ----
  function innerRing(stageKey,si,feeders){
    const out=[]; const used=new Set();
    byStage[stageKey].forEach(m=>{
      const w=winner(m,si);
      const fs=feeders.filter(f=>f.team && (f.team===m.strHomeTeam||f.team===m.strAwayTeam));
      fs.forEach(f=>used.add(f));
      const ang = fs.length? meanAngle(fs.map(f=>f.angle))
                           : rad(-90 + out.length*360/Math.max(byStage[stageKey].length,1));
      const wn=teamNode(w,badgeOf(m,w),ang,RINGS[stageKey],true,m,false);
      wn.team=w; out.push(wn);
      fs.forEach(f=>links.push({a:f,b:wn,state:lineState(m,w,f.team)}));
    });
    // Squelette jusqu'au centre : les nourriciers non appariés (matchs pas
    // encore connus) sont regroupés deux à deux vers un nœud "à déterminer".
    const left=feeders.filter(f=>!used.has(f)).sort((a,b)=>a.angle-b.angle);
    for(let i=0;i+1<left.length;i+=2){
      const ang=meanAngle([left[i].angle,left[i+1].angle]);
      const wn=teamNode(null,null,ang,RINGS[stageKey],false,null,false);
      out.push(wn);
      links.push({a:left[i],b:wn,state:"cold"},{a:left[i+1],b:wn,state:"cold"});
    }
    return out;
  }
  const r16win = innerRing("R16",1,r32win);
  const qfwin  = innerRing("QF", 2,r16win);
  const sfwin  = innerRing("SF", 3,qfwin);

  // ---- Finale + champion au centre ----
  const finalM=byStage.F[0];
  if(finalM){
    const champ=winner(finalM,4);
    sfwin.filter(f=>f.team&&(f.team===finalM.strHomeTeam||f.team===finalM.strAwayTeam))
         .forEach(f=>links.push({a:f,b:{x:C,y:C},state:lineState(finalM,champ,f.team)}));
    renderCenter(finalM,champ,badgeOf(finalM,champ),scoreTxt(finalM));
  } else {
    // finale pas encore connue : le squelette rejoint quand même le trophée
    sfwin.forEach(f=>links.push({a:f,b:{x:C,y:C},state:"cold"}));
    renderCenter(null);
  }

  // ---- Traçage des liens (derrière les pastilles) ----
  const NS="http://www.w3.org/2000/svg";
  const STYLE={
    won:  {stroke:"url(#hot)",  w:3.4, op:1,   dash:null,  glow:true },
    sched:{stroke:"url(#hot)",  w:2,   op:.8,  dash:"4 6", glow:false},
    live: {stroke:"var(--live)",w:2.8, op:1,   dash:null,  glow:false},
    lost: {stroke:"#2b2b32",    w:1,   op:.35, dash:null,  glow:false},
    cold: {stroke:"#2b2b32",    w:1,   op:.3,  dash:null,  glow:false},
  };
  const RANK={lost:0,cold:0,sched:1,live:2,won:3};   // dessin du moins au plus visible
  links.sort((a,b)=>RANK[a.state]-RANK[b.state]).forEach(l=>{
    const s=STYLE[l.state]||STYLE.cold;
    const ln=document.createElementNS(NS,"line");
    ln.setAttribute("x1",l.a.x);ln.setAttribute("y1",l.a.y);ln.setAttribute("x2",l.b.x);ln.setAttribute("y2",l.b.y);
    ln.setAttribute("stroke",s.stroke);ln.setAttribute("stroke-width",s.w);
    ln.setAttribute("stroke-linecap","round");ln.setAttribute("opacity",s.op);
    if(s.dash) ln.setAttribute("stroke-dasharray",s.dash);
    if(s.glow) ln.setAttribute("filter","url(#goldglow)");
    svg.appendChild(ln);
  });

  // ---- étiquettes d'anneaux ----
  ["R32","R16","QF","SF"].forEach(k=>{
    if(!byStage[k].length) return;
    const lab=document.createElement("div");lab.className="ringlbl";lab.textContent=LABEL[k];
    lab.style.left=C+"px";lab.style.top=(C-RINGS[k].r-16)+"px";
    el("canvas").appendChild(lab);
  });

  // ---- création DOM des pastilles ----
  function teamNode(team,badge,angle,ring,isWin,match,isOuter){
    const p=pos(angle,ring.r);
    const node={x:p.x,y:p.y,angle:normAng(angle),team};
    const d=document.createElement("div");
    const live=isLive(match), fin=isFinished(match);
    const elim=isOuter && team && fin && !isWin;   // équipe éliminée -> gris
    const sched=!team && !isOuter && match && match.strHomeTeam && match.strAwayTeam && !fin && !live; // match à venir
    d.className="node"+(!team?" pending":"")+(sched?" schednode":"")+(team&&isWin?" win":"")+(elim?" out":"")+(live&&!isOuter?" live":"");
    d.style.left=p.x+"px";d.style.top=p.y+"px";d.style.width=ring.sz+"px";d.style.height=ring.sz+"px";
    const flag=flagURL(team);
    let inner="";
    if(flag)      inner+=`<img class="flag" src="${flag}" alt="" onerror="this.src='${badge||""}';this.style.objectFit='contain'">`;
    else if(badge)inner+=`<img class="flag" src="${badge}" alt="" style="object-fit:contain">`;
    if(team&&badge) inner+=`<img class="crest" src="${badge}" alt="" onerror="this.remove()">`;
    d.innerHTML=inner;
    // score du match (porté par la pastille vainqueur / centre)
    if(!isOuter && (fin||live)){
      const s=scoreTxt(match);
      if(s){const sc=document.createElement("span");sc.className="score"+(live?" livesc":"");sc.textContent=s;d.appendChild(sc);}
    }
    // code pays sous l'anneau extérieur
    if(isOuter && team){const cc=document.createElement("span");cc.className="code";cc.textContent=short(team);d.appendChild(cc);}
    d.title=matchTip(match);
    el("canvas").appendChild(d);
    return node;
  }
}

// Nom d'équipe -> code pays ISO 3166-1 alpha-2 (pour flagcdn)
const FLAG_ISO={
  "Canada":"ca","Mexico":"mx","USA":"us","United States":"us",
  "South Africa":"za","Brazil":"br","Japan":"jp","Germany":"de","Paraguay":"py",
  "Netherlands":"nl","Morocco":"ma","Ivory Coast":"ci","Norway":"no","France":"fr",
  "Sweden":"se","Ecuador":"ec","England":"gb-eng","Scotland":"gb-sct","Wales":"gb-wls",
  "DR Congo":"cd","Belgium":"be","Senegal":"sn","Bosnia-Herzegovina":"ba","Portugal":"pt",
  "Croatia":"hr","Spain":"es","Austria":"at","Australia":"au","Egypt":"eg","Argentina":"ar",
  "Cape Verde":"cv","Switzerland":"ch","Algeria":"dz","Colombia":"co","Ghana":"gh","Qatar":"qa",
  "South Korea":"kr","Czech Republic":"cz","Haiti":"ht","Italy":"it","Uruguay":"uy","Nigeria":"ng",
  "Cameroon":"cm","Tunisia":"tn","Iran":"ir","Saudi Arabia":"sa","Denmark":"dk","Poland":"pl",
  "Serbia":"rs","Peru":"pe","Chile":"cl","Panama":"pa","Costa Rica":"cr","Jamaica":"jm",
  "Honduras":"hn","New Zealand":"nz","Jordan":"jo","Uzbekistan":"uz","Iraq":"iq",
  "United Arab Emirates":"ae","Curacao":"cw","Turkey":"tr","Greece":"gr","Ukraine":"ua",
  "Ireland":"ie","Panama ":"pa","Venezuela":"ve","Bolivia":"bo","Kenya":"ke"
};
function flagURL(name){const c=FLAG_ISO[name];return c?`https://flagcdn.com/w160/${c}.png`:null;}

function short(name){
  const map={"South Africa":"RSA","Ivory Coast":"CIV","DR Congo":"COD","Bosnia-Herzegovina":"BIH",
    "Cape Verde":"CPV","South Korea":"KOR","Saudi Arabia":"KSA","United States":"USA","USA":"USA",
    "Czech Republic":"CZE","New Zealand":"NZL","Costa Rica":"CRC","Austria":"AUT","Australia":"AUS",
    "Spain":"ESP","Netherlands":"NED","Japan":"JPN","Switzerland":"SUI","Germany":"GER","Morocco":"MAR",
    "Paraguay":"PAR","Qatar":"QAT","Haiti":"HAI","England":"ENG","Portugal":"POR","Croatia":"CRO"};
  if(map[name])return map[name];
  return (name||"").replace(/[^A-Za-z ]/g,"").slice(0,3).toUpperCase();
}
function matchTip(e){
  if(!e)return"";
  const sc=(e.intHomeScore!=null)?` ${e.intHomeScore}-${e.intAwayScore}`:"";
  const st=isLive(e)?" (LIVE)":isFinished(e)?"":` — ${e.dateEvent||""} ${(e.strTime||"").slice(0,5)}`;
  return `${e.strHomeTeam||"?"}${sc?sc.split("-")[0]:""} vs ${e.strAwayTeam||"?"}${sc?" "+sc.trim():""}${st}`;
}
function renderCenter(finalM,champ,badge,score){
  const c=el("center");
  if(finalM && champ){
    const cf=flagURL(champ);
    c.innerHTML=`<div class="node champ" style="position:static;transform:none;width:66px;height:66px;margin:0 auto">
        ${cf?`<img class="flag" src="${cf}" alt="">`:(badge?`<img class="flag" src="${badge}" style="object-fit:contain">`:"")}
        ${badge?`<img class="crest" src="${badge}" alt="" onerror="this.remove()">`:""}</div>
      <div class="trophy">🏆</div><div class="champ">${champ}<br><span style="color:var(--muted);font-weight:600">Champion</span></div>`;
  }else if(finalM){
    c.innerHTML=`<div class="trophy">🏆</div><div class="champ" style="color:#fff;font-size:11px">FINAL<br>
      ${finalM.strHomeTeam||"?"} ${score||"vs"} ${finalM.strAwayTeam||"?"}</div>`;
  }else{
    c.innerHTML=`<div class="trophy">🏆</div>`;
  }
}

// ===================== Mise à l'échelle responsive =====================
function fit(){
  const avail=Math.min(window.innerWidth-16, 960);
  const s=Math.min(1, avail/SIZE);
  el("scaler").style.transform=`scale(${s})`;
  document.querySelector(".stage").style.height=(SIZE*s+10)+"px";
}
window.addEventListener("resize",fit);

el("refreshBtn").addEventListener("click",load);
load().then(fit);
fit();
setInterval(load,60000);
</script>
